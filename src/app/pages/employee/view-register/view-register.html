<div class="dash-container">
    <div class="dash-card view-card">
        <div class="dash-header">
            <h2 class="dash-title">Employee Details</h2>
        </div>

        <div class="employee-details" *ngIf="UserData; else loading">
            <div class="detail-row">
                <span class="detail-label">Name</span>
                <span class="detail-value fw-bold">{{UserData.name}}</span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Gender</span>
                <span class="detail-value">
                    <span class="gender-badge" [ngClass]="UserData.gender === 'Male' ? 'badge-male' : 'badge-female'">
                        {{UserData.gender}}
                    </span>
                </span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Email</span>
                <span class="detail-value">{{UserData.email}}</span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Phone</span>
                <span class="detail-value">{{UserData.phone}}</span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Age</span>
                <span class="detail-value">{{UserData.age}}</span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Salary</span>
                <span class="detail-value salary-text">${{UserData.salary}}</span>
            </div>
        </div>

        <ng-template #loading>
            <div class="empty-state">
                <p>Loading employee data...</p>
            </div>
        </ng-template>

        <div class="card-footer">
            <button class="btn-primary-action" (click)="OnClose()">Back to Directory</button>
        </div>
    </div>
</div>
