<div class="navbar">
  
  <div class="nav-brand">
    AdminPanel
  </div>

  <div class="nav-profile">
    <button class="profile-icon-btn" (click)="toggleDropdown()" title="Account Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span class="dropdown-arrow">▼</span>
    </button>
    
    <div class="dropdown-content" [class.show]="dropdownOpen">
      <a routerLink="/account" (click)="closeDropdown()">⚙️ Account</a>
      <a href="javascript:void(0)" (click)="closeDropdown()">🔧 Settings</a>
      <hr style="margin: 4px 0; border: none; border-top: 1px solid #edf2f7;">
      <a href="javascript:void(0)" (click)="logout()" style="color: #e53e3e;">🚪 Logout</a>
    </div>
  </div>

</div>
