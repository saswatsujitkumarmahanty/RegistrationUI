<div class="interactive-bg">
    <div class="dash-container">
        <div class="dash-card signup-card">
            <div class="dash-header">
                <h2 class="dash-title">Create an Account</h2>
                <p class="dash-subtitle">Join us to manage your profile</p>
            </div>

            <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="dash-form">
                
                <div class="floating-group">
                    <input type="text" formControlName="name" placeholder=" " class="form-input" id="reg-name">
                    <label for="reg-name" class="floating-label">Full Name</label>
                </div>

                <div class="floating-group">
                    <div class="select-wrapper">
                        <select formControlName="gender" class="form-input select-control" id="reg-gender">
                            <option value="" disabled selected hidden></option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                        <label for="reg-gender" class="floating-label">Gender</label>
                    </div>
                </div>

                <div class="floating-group">
                    <input type="email" formControlName="email" placeholder=" " class="form-input" id="reg-email">
                    <label for="reg-email" class="floating-label">Email Address</label>
                </div>

                <div class="floating-group">
                    <input type="text" formControlName="phone" placeholder=" " class="form-input" id="reg-phone">
                    <label for="reg-phone" class="floating-label">Phone Number</label>
                </div>

                <div class="form-row">
                    <div class="floating-group flex-1">
                        <input type="number" formControlName="age" placeholder=" " class="form-input" id="reg-age">
                        <label for="reg-age" class="floating-label">Age</label>
                    </div>
                    <div class="floating-group flex-1">
                        <input type="number" formControlName="salary" placeholder=" " class="form-input" id="reg-salary">
                        <label for="reg-salary" class="floating-label">Salary ($)</label>
                    </div>
                </div>

                <button type="submit" [disabled]="!signupForm.valid" class="btn-primary-action">
                    Sign Up Now
                </button>

                <div class="login-redirect">
                    <a routerLink="/login" class="login-link">Already have an account? Log In</a>
                </div>
            </form>
        </div>
    </div>
</div>
